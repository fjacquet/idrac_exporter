# Pull-based stack: runs the published GHCR image instead of building locally.
#
#   IDRAC1_PASSWORD='...' docker compose -f docker-compose.ghcr.yml up -d
#
# Pin a version with IDRAC_TAG (defaults to :latest):
#   IDRAC_TAG=2.6.1 IDRAC1_PASSWORD='...' docker compose -f docker-compose.ghcr.yml up -d
services:
  idrac_exporter:
    image: ghcr.io/fjacquet/idrac_exporter:${IDRAC_TAG:-latest}
    container_name: idrac_exporter
    ports:
      - "9348:9348"
    volumes:
      - ./config.yaml:/etc/prometheus/idrac.yml:ro
    environment:
      - IDRAC1_HOST=${IDRAC1_HOST:-192.168.1.1}
      - IDRAC1_USERNAME=${IDRAC1_USERNAME:-root}
      - IDRAC1_PASSWORD=${IDRAC1_PASSWORD:-}
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: idrac_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/idrac.rules.yml:/etc/prometheus/idrac.rules.yml:ro
    depends_on:
      - idrac_exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: idrac_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/idrac.json:/var/lib/grafana/dashboards/idrac.json:ro
      - ./grafana/idrac_overview.json:/var/lib/grafana/dashboards/idrac_overview.json:ro
      - ./grafana/status-alternative.json:/var/lib/grafana/dashboards/status-alternative.json:ro
    depends_on:
      - prometheus
    restart: unless-stopped
