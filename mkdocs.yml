site_name: iDRAC Exporter
site_description: Redfish (iDRAC, iLO, XClarity, …) exporter for Prometheus and OTLP
repo_url: https://github.com/fjacquet/idrac_exporter
repo_name: fjacquet/idrac_exporter
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

exclude_docs: |
  superpowers/
  swagger/

nav:
  - Home: index.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Usage: usage.md
  - Deployment:
      - Docker Compose: deployment/docker.md
      - Topologies: deployment/topologies.md
  - Dashboards: dashboards.md
  - Metrics: metrics.md
  - OTLP push: otlp.md
  - Architecture Decisions:
      - Overview: adr/index.md
      - 0001 Supply-chain hardening: adr/0001-supply-chain-hardening.md
      - 0002 Multi-target + optional OTLP: adr/0002-multi-target-with-optional-otlp.md
      - 0003 Hand-rolled Redfish client: adr/0003-handrolled-redfish-client.md
      - 0004 Naming & units: adr/0004-metric-naming-and-units.md
      - 0005 Label-key invariant: adr/0005-label-key-invariant.md
      - 0006 Auth & retry: adr/0006-token-auth-and-retry.md
      - 0007 Config hot reload: adr/0007-config-hot-reload.md
      - 0008 Absent, never zero: adr/0008-absent-not-zero-parsing.md
      - 0009 OTLP via Prometheus bridge: adr/0009-otlp-via-prometheus-bridge.md
