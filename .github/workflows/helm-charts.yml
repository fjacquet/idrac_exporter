name: Release Helm Chart

on:
  pull_request:
    paths:
      - 'charts/**'
  push:
    branches: [main]
    paths:
      - 'charts/**'

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Lint chart
        run: helm lint charts/idrac-exporter

      - name: Render templates
        run: helm template release-test charts/idrac-exporter > /dev/null

  publish-chart:
    needs: lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Log in to GHCR
        run: helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin <<< "${{ secrets.GITHUB_TOKEN }}"

      - name: Package and push chart (OCI)
        run: |
          helm package charts/idrac-exporter --destination dist-charts
          helm push dist-charts/*.tgz "oci://ghcr.io/${{ github.repository_owner }}/charts"
