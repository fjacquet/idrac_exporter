      tags:
        - DellOSDeploymentService
  /redfish/v1/Systems/{ComputerSystemId}/Oem/Dell/DellOSDeploymentService/Actions/DellOSDeploymentService.ConnectNetworkISOImage:
    post:
      description: >-
        The ConnectNetworkISOImage() method is used to connect to the ISO
        present on the network share and expose the ISO as a local USB CD-ROM
        device to the host system. This method will connect to the ISO located
        on an NFS/CIFS share and expose it as a virtual CDROM device to the host
        server. Even though the successful method execution shall not change the
        boot order of that device, the host shall always boot to the virtual
        CDROM. Also note that after the ISO is exposed to the host server,
        Lifecycle Controller shall be locked and no other jobs like
        configuration/update etc shall be performed until the ISO is detached
        using the DisconnectNetworkISOImage() method. The successful exection of
        the DisconnectNetworkISOImage() shall revert the host system to the
        regular boot list. NOTE: The recommended methodology for connecting to
        an ISO image is by using the ConnectRFSISOImage()  method that utilizes
        the remote file system (RFS).


        **Privilege**: ConfigureComponents, Login

        > **NOTE**: The recommended methodology for connecting to an ISO image
        is by using the ConnectRFSISOImage action that

        utilizes the remote file system (RFS).
      operationId: >-
        Action_ConnectNetworkISOImage_/redfish/v1/Systems/{ComputerSystemId}/Oem/Dell/DellOSDeploymentService/Actions/DellOSDeploymentService.ConnectNetworkISOImage
      parameters:
        - description: The value of the Id property of the ComputerSystem resource
          in: path
          name: ComputerSystemId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
