              Password: abc@1234
              ShareName: Sharename_string
              ShareType: CIFS
              UserName: user_name
            schema:
              $ref: >-
                DellOSDeploymentService.v1_2_0.yaml#/components/schemas/DellOSDeploymentService_v1_2_0_ConnectNetworkISOImageRequestBody
