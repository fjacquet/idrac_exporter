  /redfish/v1/Managers/{ManagerId}/Oem/Dell/DellJobService/Actions/DellJobService.DeleteJobQueue:
    post:
      description: >-
        The DeleteJobQueue() method is used for deleting jobs from the JobQueue
        or the job store. To clear all the jobs, use the keyword JID_CLEARALL
        for the JobID. Successful execution of this method with the JID_CLEARALL
        parameter value also clears all the pending attribute values. When the
        number of jobs in the JobQueue reaches the maximum limit, jobs in the
        ""Completed"" state are deleted automatically. Note: on 11th Generation
        of PowerEdge systems, jobs in the ""Failed"" state are not deleted
        automatically and must be removed manually one at a time, or all
        together using the keyword JID_CLEARALL.


        **Privilege**: ConfigureComponents, Login

        > **NOTE**: On the older PowerEdge systems, jobs in the Failed state are
        not deleted automatically and must be removed

        manually one at a time, or all together using the keyword JID_CLEARALL.
      operationId: >-
        Action_DeleteJobQueue_/redfish/v1/Managers/{ManagerId}/Oem/Dell/DellJobService/Actions/DellJobService.DeleteJobQueue
