  /redfish/v1/Systems/{ComputerSystemId}/Bios/Actions/Oem/DellBios.RunBIOSLiveScanning:
    post:
      description: >-
        Real time BIOS scanning verifies the integrity and authenticity of the
        BIOS image in the Primary ROM when the host is powered ON, but not in
        the POST. This feature is available only with iDRAC Datacenter license
        and user need to have the Debug privilege to perform this operation

        > **NOTE**: RunBIOSLiveScanning action is available with iDRAC version
        4.10.10.10 and later versions and only on PowerEdge Rx5x/Cx5x (AMD)
        systems. For the list of systems, see the Supported systems section in
        the release notes document for iDRAC version 4.10.10.10. </nl>

        > **NOTE**: When this action is performed, a recurring job gets
        scheduled for immediate implementation. After the job is

        > complete, the recurring task gets deleted automatically. Therefore,
        performing a GET on the task URI may result in a 404 response after the
        job is completed.
      operationId: >-
        Action_RunBIOSLiveScanning_/redfish/v1/Systems/{ComputerSystemId}/Bios/Actions/Oem/DellBios.RunBIOSLiveScanning
      parameters:
        - description: The value of the Id property of the ComputerSystem resource
          in: path
          name: ComputerSystemId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            example: {}
            schema:
              $ref: >-
                DellBios.v1_1_0.yaml#/components/schemas/DellBios_v1_1_0_RunBIOSLiveScanningRequestBody
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedfishError'
          description: The response contains the results of the ClearLog action
        '202':
          content:
            application/json:
              schema:
                $ref: Task.v1_7_4.yaml#/components/schemas/Task_v1_7_4_Task
          description: Accepted; a Task has been generated
        '204':
          description: Success, but no response data
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedfishError'
          description: Error condition
      security:
        - basicAuth: []
        - X-Auth: []
      summary: RunBIOSLiveScanning Action
      tags:
        - Bios
