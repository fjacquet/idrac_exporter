  /redfish/v1/Managers/{ManagerId}/Oem/Dell/DellLCService/Actions/DellLCService.ReInitiateAutoDiscovery:
    post:
      description: >-
        The ReInitiateAutoDiscovery() method is used for reinitiating the
        discovery and handshake with static IP configuration. If the method
        successfully executes, iDRAC is in the static IP mode after the
        auto-discovery is initiated and thus, does not require DHCP setup. The
        static IP information for auto-discovery can be set either through the
        optional input parameters of this method or through the iDRAC attributes
        in the iDRAC Card Profile. After the successful auto-discovery
        initiation, if the IPAddress parameter has non-NULL value, the iDRAC
        IPv4 address is set to that parameter's value, otherwise the iDRAC IPv4
        Address is set to the Address attribute in the IPv4 Information group in
        the iDRAC Card Profile. After the successful auto-discovery initiation,
        if the Mask parameter has a non-NULL value, the iDRAC IPv4 address net
        mask is set to that parameter's value, otherwise the iDRAC IPv4 address
        net mask is set to the to the Netmask attribute in the IPv4 Information
        group in the iDRAC Card Profile. After the successful auto-discovery
        initiation, if the Gateway parameter has non-NULL value, then the iDRAC
        IPv4 gateway address is set to that parameter's value, otherwise the
        iDRAC IPv4 gateway is set to the to the Gateway attribute in the IPv4
        Information group in the iDRAC Card Profile. After the successful
        auto-discovery initiation, if the DNS parameter has non-NULL value, then
        the iDRAC IPv4 DNS address is set to that parameter's value, otherwise
        the iDRAC IPv4 DNS address is set to the to the DNS1 attribute in the
        IPv4 Information group in the iDRAC Card Profile. After the successful
        auto-discovery initiation, if the Domain parameter has non-NULL value,
        then the iDRAC domain name is set to that parameter's value, otherwise
        the iDRAC domain name is set to the to the DNSDomainName attribute in
        the NIC Information group in the iDRAC Card Profile.


        **Privilege**: ConfigureComponents, Login
      operationId: >-
        Action_ReInitiateAutoDiscovery_/redfish/v1/Managers/{ManagerId}/Oem/Dell/DellLCService/Actions/DellLCService.ReInitiateAutoDiscovery
      parameters:
        - description: The value of the Id property of the Manager resource
          in: path
          name: ManagerId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            example:
              DNS: IP
              Domain: Domainname
              Gateway: GatewayIP
              IPAddress: IP
              Mask: MASKIP
              PerformAutoDiscovery: NextBoot
              ProvisioningServer: IP
            schema:
              $ref: >-
                DellLCService.v1_8_1.yaml#/components/schemas/DellLCService_v1_8_1_ReInitiateAutoDiscoveryRequestBody
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedfishError'
          description: >-
            The response contains the results of the ReInitiateAutoDiscovery
            action
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedfishError'
          description: >-
            The response contains the results of the ReInitiateAutoDiscovery
            action
        '202':
          content:
            application/json:
              schema:
                $ref: Task.v1_7_4.yaml#/components/schemas/Task_v1_7_4_Task
          description: Accepted; a Task has been generated
        '204':
          description: Success, but no response data
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedfishError'
          description: Error Condition.
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedfishError'
          description: Error condition
      security:
        - basicAuth: []
        - X-Auth: []
      summary: ReInitiateAutoDiscovery Action
