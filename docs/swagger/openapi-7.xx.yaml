        > **Important Notes**: 

        > - HTTP shares with authentication are not supported for virtual media.

        > - Using the character '@' in virtual media UserName, Password, or
        Image is not supported.

        > - From iDRAC firmware version 4.20.20.20 release onwards, Redfish
        supports inserting Username, Password, and Share name as separate fields
        in the payload while performing the action. Firmware backward
        compatibility allows you to continue using the previous supported method
        that is by inserting the credentials in the payload in the format:
        `{username}:{Password}@{share name}`</nl> In the latest version of
        iDRAC, if both these methods are used then the information that is
        provided in separate fields take precedence over the previous supported
        method.</nl>

