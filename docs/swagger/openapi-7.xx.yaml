                    DeepPATCH: false
                    DeepPOST: false
                  ExcerptQuery: false
                  ExpandQuery:
                    ExpandAll: true
                    Levels: true
                    Links: true
                    MaxLevels: 1
                    NoLinks: true
                  FilterQuery: true
                  OnlyMemberQuery: true
                  SelectQuery: true
                RedfishVersion: 1.20.1
                Registries:
                  '@odata.id': /redfish/v1/Registries
                ServiceIdentification: 5WN7507
                SessionService:
                  '@odata.id': /redfish/v1/SessionService
                Systems:
                  '@odata.id': /redfish/v1/Systems
                Tasks:
                  '@odata.id': /redfish/v1/TaskService
                TelemetryService:
                  '@odata.id': /redfish/v1/TelemetryService
