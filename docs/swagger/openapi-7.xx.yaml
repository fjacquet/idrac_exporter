              schema:
                $ref: >-
                  ServiceRoot.v1_17_0.yaml#/components/schemas/ServiceRoot_v1_17_0_ServiceRoot
          description: The response contains a representation of the ServiceRoot resource
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedfishError'
          description: Error condition
      security: []
      summary: ServiceRoot instance
      tags:
        - ServiceRoot
  /redfish/v1/AccountService:
    get:
      description: >-
        The `AccountService` schema defines an account service.  The properties
        are common to, and enable management of, all user accounts.  The
        properties include the password requirements and control features, such
        as account lockout.  Properties and actions in this service specify
        general behavior that should be followed for typical accounts, however
        implementations might override these behaviors for special accounts or
        situations to avoid denial of service or other deadlock situations.


        **Privilege**: Login

        </nl>

        >  **NOTE**: DMTF implementation for Redfish does not display all the
        assigned roles for a user. To view all the privileges, see the Users
        section in iDRAC GUI under iDRAC Settings.</nl>

        > **NOTE**: This URI has been updated to meet the latest Redfish
        specification based URI naming conventions. The following non-compliant
        URI may get deprecated in future releases.</nl> Old URI:
