components:
  schemas:
    RedfishError:
      description: The error payload from a Redfish Service.
      properties:
        error:
          description: The properties that describe an error from a Redfish Service.
          properties:
            '@Message.ExtendedInfo':
              description: An array of messages describing one or more error messages.
              items:
                $ref: >-
                  https://redfish.dmtf.org/schemas/v1/Message.v1_2_1.yaml#/components/schemas/Message_v1_2_1_Message
              type: array
              x-longDescription: >-
                This property shall be an array of message objects describing
                one or more error messages.
            code:
              description: >-
                A string indicating a specific MessageId from a Message
                Registry.
              readOnly: true
              type: string
              x-longDescription: >-
                This property shall contain a string indicating a specific
                MessageId from a Message Registry.
            message:
              description: >-
                A human-readable error message corresponding to the message in a
                Message Registry.
              readOnly: true
              type: string
              x-longDescription: >-
                This property shall contain a human-readable error message
                corresponding to the message in a Message Registry.
          required:
            - code
            - message
          type: object
          x-longDescription: >-
            The Redfish Specification-described type shall contain properties
            that describe an error from a Redfish Service.
      required:
        - error
      type: object
      x-longDescription: >-
        The Redfish Specification-described type shall contain an error payload
        from a Redfish Service.
  securitySchemes:
    X-Auth:
      in: header
      name: X-Auth-Token
      type: apiKey
    basicAuth:
      scheme: basic
      type: http
info:
  contact:
    name: Dell iDRAC Redfish API
    url: >-
      https://www.dell.com/support/article/en-in/sln310624/redfish-api-with-dell-integrated-remote-access-controller?lang=en
  description: This contains the definition of a Redfish service.
  title: Dell iDRAC 9 Redfish API Overview
  version: 7.00.00.00
  x-copyright: >-
    Copyright 2020 DMTF. For the full DMTF copyright policy, see
    http://www.dmtf.org/about/policies/copyright
openapi: 3.0.1
paths:
  /redfish/v1:
    get:
      description: >-
        The `ServiceRoot` schema describes the root of the Redfish service,
        located at the '/redfish/v1' URI.  All other resources accessible
        through the Redfish interface on this device are linked directly or
        indirectly from the service root.


        **Privilege**: NoAuth
      operationId: GET_/redfish/v1
      responses:
        '200':
          content:
            application/json:
              example:
                '@odata.context': /redfish/v1/$metadata#ServiceRoot.ServiceRoot
                '@odata.id': /redfish/v1
                '@odata.type': '#ServiceRoot.v1_17_0.ServiceRoot'
                AccountService:
                  '@odata.id': /redfish/v1/AccountService
                CertificateService:
                  '@odata.id': /redfish/v1/CertificateService
                Chassis:
                  '@odata.id': /redfish/v1/Chassis
                ComponentIntegrity:
                  '@odata.id': /redfish/v1/ComponentIntegrity
                Description: Root Service
                EventService:
                  '@odata.id': /redfish/v1/EventService
                Fabrics:
                  '@odata.id': /redfish/v1/Fabrics
                Id: RootService
                JobService:
                  '@odata.id': /redfish/v1/JobService
                JsonSchemas:
                  '@odata.id': /redfish/v1/JsonSchemas
                LicenseService:
                  '@odata.id': /redfish/v1/LicenseService
                Links:
                  Sessions:
                    '@odata.id': /redfish/v1/SessionService/Sessions
                Managers:
                  '@odata.id': /redfish/v1/Managers
                Name: Root Service
                Oem:
                  Dell:
                    '@odata.context': /redfish/v1/$metadata#DellServiceRoot.DellServiceRoot
                    '@odata.type': '#DellServiceRoot.v1_0_0.DellServiceRoot'
                    IsBranded: 0
                    ManagerMACAddress: 6c:3c:8c:60:a7:4a
                    ServiceTag: 5WN7507
                Product: Integrated Dell Remote Access Controller
                ProtocolFeaturesSupported:
