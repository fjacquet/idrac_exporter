  /redfish/v1/Managers/{ManagerId}/Oem/Dell/DellTimeService/Actions/DellTimeService.ManageTime:
    post:
      description: >-
        The DellTimeService.ManageTime() method is used to query the service
        processor time and to set the service processor time during the host
        system reboots and service processor resets. The service processor time
        set through the successful execution of this method is volatile and does
        not persist. The service processor time resets to the BIOS time at every
        reset of the host system or the service processor. Note: ManageTime
        method not supported on modular servers(MX840, MX740, etc) and also
        servers with NTP mode enabled.
      operationId: >-
        Action_ManageTime_/redfish/v1/Managers/{ManagerId}/Oem/Dell/DellTimeService/Actions/DellTimeService.ManageTime
      parameters:
        - description: The value of the Id property of the Manager resource
          in: path
          name: ManagerId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            example:
              GetRequest: true
              TimeData: '2022-12-03T10:15:30+01:00'
            schema:
              $ref: >-
                DellTimeService.v1_0_1.yaml#/components/schemas/DellTimeService_v1_0_1_ManageTimeRequestBody
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedfishError'
          description: The response contains the results of the ManageTime action
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedfishError'
          description: The response contains the results of the ManageTime action
        '202':
          content:
            application/json:
              schema:
                $ref: Task.v1_7_4.yaml#/components/schemas/Task_v1_7_4_Task
          description: Accepted; a Task has been generated
        '204':
          description: Success, but no response data
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedfishError'
          description: Error Condition.
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedfishError'
          description: Error condition
      security:
        - basicAuth: []
        - X-Auth: []
      summary: ManageTime Action
      tags:
        - DellTimeService
