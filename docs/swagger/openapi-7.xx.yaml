        - description: The value of the Id property of the Manager resource
          in: path
          name: ManagerId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            example:
              JobID: JID_CLEARALL
            schema:
              $ref: >-
                DellJobService.v1_2_0.yaml#/components/schemas/DellJobService_v1_2_0_DeleteJobQueueRequestBody
        required: true
