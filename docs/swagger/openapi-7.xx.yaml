  /redfish/v1/AccountService/Accounts/{ManagerAccountId}:
    get:
      description: >-
        The `ManagerAccount` schema defines the user accounts that are owned by
        a manager.  Changes to a manager account might affect the current
        Redfish service connection if this manager is responsible for the
        Redfish service.


        **Privilege**: Login

        > **NOTE**: Creating a local user with operator privileges sets the
        prvileges to Login, Configure, System Control, VirtualConsole access,
        VirtualMedia access, Alerts, and Debug by default. To set a customer
        privilege value, perform Patch method for attribute
        "Users.{id}.Privilege" under the following URI with the sum total of the
        required privilege values.</nl>

        > URI: /redfish/v1/Managers/iDRAC.Embedded.1/Attributes/


        Following are some Privilege values:</nl>


        Privilege | Decimal value 

        ---------|----------

        Login | 1 | 

        Configure iDRAC | 2 | 

        Configure Users | 4 | 

        Clear Logs | 8 |   

        Execute Server Control Commands | 16 |

        Access Virtual Console | 32 |

        Access Virtual Media | 64 |

        Test alerts   | 128 |

        Execute debug commands | 256 |</nl>

        > **NOTE**: This URI has been updated to meet the latest Redfish
        specification based URI naming conventions. The following non-compliant
        URI may get deprecated in future releases.</nl> 

        Old URI:
        '/redfish/v1/Managers/iDRAC.Embedded.1/Accounts/{ManagerAccountId}'
      operationId: GET_/redfish/v1/AccountService/Accounts/{ManagerAccountId}
      parameters:
        - description: The value of the Id property of the ManagerAccount resource
          in: path
          name: ManagerAccountId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              example:
                '@odata.context': /redfish/v1/$metadata#ManagerAccount.ManagerAccount
                '@odata.etag': '"346336"'
                '@odata.id': /redfish/v1/AccountService/Accounts/1
                '@odata.type': '#ManagerAccount.v1_12_1.ManagerAccount'
                AccountTypes:
                  - Redfish
                  - SNMP
                  - OEM
                  - HostConsole
                  - ManagerConsole
                  - IPMI
                  - KVMIP
                  - VirtualMedia
                  - WebUI
                Description: User Account
                Enabled: false
                Id: '1'
                Links:
                  Role:
                    '@odata.id': /redfish/v1/AccountService/Roles/None
                Locked: false
                Name: User Account
                OEMAccountTypes:
                  - IPMI
                  - SOL
                  - WSMAN
                  - UI
                  - RACADM
                Oem:
                  Dell:
                    '@odata.type': '#DellManagerAccount.v1_0_0.DellManagerAccount'
                    SNMPv3PassphraseEnabled: Disabled
                Password: null
                PasswordChangeRequired: false
                PasswordExpiration: null
                RoleId: None
                SNMP:
                  AuthenticationKey: null
                  AuthenticationKeySet: false
                  AuthenticationProtocol: HMAC_SHA96
                  EncryptionKey: null
                  EncryptionKeySet: false
                  EncryptionProtocol: CFB128_AES128
                StrictAccountTypes: false
                UserName: ''
              schema:
                $ref: >-
                  ManagerAccount.v1_12_1.yaml#/components/schemas/ManagerAccount_v1_12_1_ManagerAccount
          description: >-
            The response contains a representation of the ManagerAccount
            resource
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedfishError'
          description: Error condition
      security:
        - basicAuth: []
        - X-Auth: []
      summary: ManagerAccount instance
      tags:
        - ManagerAccount
    patch:
      description: |-


        **Privilege**: ConfigureUsers, Login
      operationId: PATCH_/redfish/v1/AccountService/Accounts/{ManagerAccountId}
      parameters:
        - description: The value of the Id property of the ManagerAccount resource
          in: path
          name: ManagerAccountId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: >-
                ManagerAccount.v1_12_1.yaml#/components/schemas/ManagerAccount_v1_12_1_ManagerAccountPATCHRequestBody
        required: true
      responses:
        '200':
          content:
            application/json:
