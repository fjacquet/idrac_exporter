  /redfish/v1/Systems/{ComputerSystemId}/Oem/Dell/DellOSDeploymentService/Actions/DellOSDeploymentService.ConfigurableBootToNetworkISO:
    post:
      description: >-
        The ConfigurableBootToNetworkISO() method exposes an ISO Image present
        on a network share as a CDROM device to the host server for a specified
        exposure duration interval or by default for 18 hrs. Upon the successful
        execution, based on the ResetType parameter, the host system shall
        either immediately cold boot or warm boot. Upon this reset, the system
        shall then boot to the ISO Image. If ResetType specifies no immediate
        reboot, then upon the next host system reset, the system shall boot to
        the ISO Image. Furthermore, if immediate reset is not specified, then
        the system should be rebooted before the exposure duration interval
        expires, otherwise the system shall fail to boot to the ISO Image.


        **Privilege**: ConfigureComponents, Login
      operationId: >-
        Action_ConfigurableBootToNetworkISO_/redfish/v1/Systems/{ComputerSystemId}/Oem/Dell/DellOSDeploymentService/Actions/DellOSDeploymentService.ConfigurableBootToNetworkISO
      parameters:
        - description: The value of the Id property of the ComputerSystem resource
          in: path
          name: ComputerSystemId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            example:
              ExposeDuration: '2022-12-03T10:15:30+01:00'
              HashType: SHA1
              HashValue: hash_string
              IPAddress: 1.2.3.4
              ImageName: ImageName_String
              Password: abc@1234
              ResetType: ColdReset
              ShareName: Sharename_string
              ShareType: NFS
              UserName: user_name
              Workgroup: workgroup_string
            schema:
              $ref: >-
                DellOSDeploymentService.v1_2_0.yaml#/components/schemas/DellOSDeploymentService_v1_2_0_ConfigurableBootToNetworkISORequestBody
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedfishError'
          description: >-
            The response contains the results of the
            ConfigurableBootToNetworkISO action
        '201':
          content:
            application/json:
              schema:
