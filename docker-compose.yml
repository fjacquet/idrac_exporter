# One-command demo stack: exporter (built locally) + Prometheus + Grafana.
#
#   IDRAC1_HOST=10.0.0.10 IDRAC1_USERNAME=monitor IDRAC1_PASSWORD='...' docker compose up -d
#
# Then: Grafana http://localhost:3000 (admin/admin), Prometheus http://localhost:9090.
# config.yaml is the source of truth; the IDRAC1_* env vars feed its ${...} references.
services:
  idrac_exporter:
    build: .
    image: idrac_exporter
    # Build-only image (no registry). Without this, `docker compose up` would try to
    # pull `idrac_exporter` from Docker Hub and fail.
    pull_policy: build
    container_name: idrac_exporter
    ports:
      - "9348:9348"
    volumes:
      - ./config.yaml:/etc/prometheus/idrac.yml:ro
    environment:
      - IDRAC1_HOST=${IDRAC1_HOST:-192.168.1.1}
      - IDRAC1_USERNAME=${IDRAC1_USERNAME:-root}
      - IDRAC1_PASSWORD=${IDRAC1_PASSWORD:-}
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: idrac_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/idrac.rules.yml:/etc/prometheus/idrac.rules.yml:ro
    depends_on:
      - idrac_exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: idrac_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      # Datasource + dashboard providers (auto-provisioned on startup).
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # Bundled dashboards.
      - ./grafana/idrac.json:/var/lib/grafana/dashboards/idrac.json:ro
      - ./grafana/idrac_overview.json:/var/lib/grafana/dashboards/idrac_overview.json:ro
      - ./grafana/status-alternative.json:/var/lib/grafana/dashboards/status-alternative.json:ro
    depends_on:
      - prometheus
    restart: unless-stopped
